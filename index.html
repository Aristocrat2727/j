<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat PRO FIXED</title>

<style>
body{margin:0;font-family:system-ui;background:#0e1621;color:white;display:flex;height:100vh}
#auth{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center}
#app{display:none;width:100%}
#sidebar{width:280px;background:#17212b;padding:10px}
#chat{flex:1;display:flex;flex-direction:column}
#messages{flex:1;overflow:auto;padding:10px}
.msg{padding:8px;margin:5px;border-radius:10px;max-width:60%;cursor:pointer}
.my{background:#2b5278;margin-left:auto}
.other{background:#1f2c38}
.meta{font-size:10px;opacity:0.6;margin-top:2px}
.replyBox{font-size:11px;color:#aaa;border-left:2px solid #888;padding-left:5px;margin-bottom:4px}
input,button{padding:10px;border:none;border-radius:20px;margin:5px}
button{background:#2b5278;color:white}
.userItem{padding:8px;border-bottom:1px solid #0f2433;cursor:pointer}
#replying{font-size:12px;color:#aaa;padding-left:10px}
</style>
</head>

<body>

<div id="auth">
  <input id="usernameInput" placeholder="Username">
  <button id="startBtn">Start</button>
</div>

<div id="app">
  <div id="sidebar">
    <div id="users"></div>
  </div>

  <div id="chat">
    <div id="chatHeader">Select user</div>
    <div id="messages"></div>

    <div id="replying"></div>

    <div style="display:flex">
      <input id="msgInput" style="flex:1">
      <button id="sendBtn">Send</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
import {
  getFirestore,
  doc, setDoc, getDoc, updateDoc,
  collection, addDoc,
  onSnapshot,
  query, orderBy,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBuTQ0dOAciBNDYpa6UURAnyaFCDAY7Pio",
  authDomain: "nita-3d3ca.firebaseapp.com",
  projectId: "nita-3d3ca",
  appId: "1:33599925674:web:6333e275daed0c053c0fd3"
};

const appFirebase = initializeApp(firebaseConfig);
const auth = getAuth(appFirebase);
const db = getFirestore(appFirebase);

// DOM
const authDiv = document.getElementById("auth");
const appDiv = document.getElementById("app");
const usersEl = document.getElementById("users");
const chatHeader = document.getElementById("chatHeader");
const messages = document.getElementById("messages");
const msgInput = document.getElementById("msgInput");
const sendBtn = document.getElementById("sendBtn");
const replying = document.getElementById("replying");

let currentChat = null;
let replyTo = null;

// ===== LOGIN =====
signInAnonymously(auth);

onAuthStateChanged(auth, async (user)=>{
  if(user){
    const snap = await getDoc(doc(db,"users",user.uid));
    if(snap.exists()){
      showApp();
    }
  }
});

// ===== SHOW APP =====
function showApp(){
  authDiv.style.display="none";
  appDiv.style.display="flex";
  loadUsers();
}

// ===== REGISTER =====
startBtn.onclick = async ()=>{
  const name = usernameInput.value.trim();
  if(!name) return;

  await setDoc(doc(db,"users",auth.currentUser.uid),{
    username:name,
    online:true,
    lastSeen:Date.now()
  });

  showApp();
};

// ===== ONLINE STATUS =====
setInterval(()=>{
  if(auth.currentUser){
    setDoc(doc(db,"users",auth.currentUser.uid),{
      online:true,
      lastSeen:Date.now()
    },{merge:true});
  }
},4000);

// ===== USERS =====
function loadUsers(){
  onSnapshot(collection(db,"users"), snap=>{
    usersEl.innerHTML="";
    snap.forEach(u=>{
      if(u.id!==auth.currentUser.uid){
        const d=u.data();
        const isOnline = Date.now() - (d.lastSeen||0) < 7000;

        usersEl.innerHTML+=`
          <div class="userItem" onclick="openChat('${u.id}','${d.username}')">
            ${d.username}
            <div style="font-size:10px;color:${isOnline?'lime':'gray'}">
              ${isOnline?'online':'offline'}
            </div>
          </div>
        `;
      }
    });
  });
}

// ===== OPEN CHAT =====
window.openChat=(uid,name)=>{
  currentChat=uid;
  chatHeader.innerText=name;
  loadMessages();
};

// ===== ENTER =====
msgInput.addEventListener("keydown",(e)=>{
  if(e.key==="Enter"){
    e.preventDefault();
    sendBtn.click();
  }
});

// ===== SEND =====
sendBtn.onclick=async()=>{
  if(!currentChat) return;

  const text=msgInput.value.trim();
  if(!text) return;

  const chatId=getChatId(auth.currentUser.uid,currentChat);

  await addDoc(collection(db,"chats",chatId,"messages"),{
    text,
    sender:auth.currentUser.uid,
    time:serverTimestamp(),
    replyText: replyTo?.text || null,
    read:false
  });

  msgInput.value="";
  replyTo=null;
  replying.innerHTML="";
};

// ===== CHAT ID =====
function getChatId(a,b){
  return a<b ? a+"_"+b : b+"_"+a;
}

// ===== LOAD MESSAGES =====
function loadMessages(){
  const chatId=getChatId(auth.currentUser.uid,currentChat);

  const q=query(collection(db,"chats",chatId,"messages"),orderBy("time"));

  onSnapshot(q,(snap)=>{
    messages.innerHTML="";

    snap.forEach(m=>{
      const d=m.data();

      let replyHTML="";
      if(d.replyText){
        replyHTML=`<div class="replyBox">${d.replyText}</div>`;
      }

      const time=d.time?.toDate()?.toLocaleTimeString()||"";

      const div=document.createElement("div");
      div.className="msg "+(d.sender===auth.currentUser.uid?'my':'other');

      div.innerHTML=`
        ${replyHTML}
        ${d.text}
        <div class="meta">${time}</div>
      `;

      // reply click
      div.onclick=()=>{
        replyTo={text:d.text};
        replying.innerHTML=`Reply: ${d.text} <button onclick="cancelReply()">X</button>`;
      };

      messages.appendChild(div);

      if(d.sender!==auth.currentUser.uid && !d.read){
        updateDoc(m.ref,{read:true});
      }
    });

    // автоскролл
    messages.scrollTop = messages.scrollHeight;
  });
}

// ===== CANCEL REPLY =====
window.cancelReply=()=>{
  replyTo=null;
  replying.innerHTML="";
};

</script>
</body>
</html>
